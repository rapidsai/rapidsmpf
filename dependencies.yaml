          - matrix:
              cuda: "12.*"
              cuda_suffixed: "true"
            packages:
              - pylibcudf-cu12==25.8.*,>=0.0.0a0
          - matrix:
              cuda: "11.*"
              cuda_suffixed: "true"
            packages:
              - pylibcudf-cu11==25.8.*,>=0.0.0a0
          - matrix:
            packages:
              - *pylibcudf_unsuffixed
  depends_on_dask_cuda:
    common:
      - output_types: [conda, requirements, pyproject]
        packages:
          - dask-cuda==25.8.*,>=0.0.0a0
      - output_types: requirements
        packages:
